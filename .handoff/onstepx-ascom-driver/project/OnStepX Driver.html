<!doctype html>
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8" />
<title>OnStepX ASCOM Driver</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=IBM+Plex+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #14171c;
    --panel: #1b1f26;
    --panel-2: #1f242d;
    --panel-inset: #10131a;
    --border: #2a313c;
    --border-strong: #3a4250;
    --text: #e6ebf2;
    --text-dim: #9aa4b2;
    --text-faint: #6b7582;
    --label: #8a94a3;
    --accent: oklch(0.62 0.22 25);
    --accent-ink: #ffffff;
    --accent-soft: oklch(0.62 0.22 25 / 0.12);
    --danger: oklch(0.58 0.22 25);
    --ok: oklch(0.74 0.17 150);
    --warn: oklch(0.80 0.15 85);
    --info: oklch(0.72 0.13 230);
    --input-bg: #0f1218;
    --input-border: #323a47;
    --input-border-hover: #4a5362;
    --btn-bg: #242a33;
    --btn-bg-hover: #2c333e;
    --btn-bg-active: #323a46;
    --chip: #242a33;
    --console-bg: #0b0d12;
    --console-line: #141821;
    --scroll-track: #181c24;
    --scroll-thumb: #39414f;
    --scroll-thumb-hover: #4a5362;

    --c-ts: #6b98e0;
    --c-cmd: #e8b86d;
    --c-resp: #8bd0a0;
    --c-meta: #8a94a3;

    --radius: 6px;
    --font-sans: "Inter", "Segoe UI", system-ui, sans-serif;
    --font-mono: "JetBrains Mono", ui-monospace, monospace;
  }
  html[data-theme="light"] {
    --bg: #eef0f3;
    --panel: #ffffff;
    --panel-2: #f7f8fa;
    --panel-inset: #f1f3f6;
    --border: #dde1e7;
    --border-strong: #c6ccd5;
    --text: #1a1d22;
    --text-dim: #51585f;
    --text-faint: #7a818a;
    --label: #5a626c;
    --accent-ink: #ffffff;
    --input-bg: #ffffff;
    --input-border: #c8cdd5;
    --input-border-hover: #9aa2ad;
    --btn-bg: #f3f5f8;
    --btn-bg-hover: #e8ebf0;
    --btn-bg-active: #dde1e7;
    --chip: #eef1f5;
    --console-bg: #0f1218;
    --console-line: #161a23;
    --scroll-track: #e3e6eb;
    --scroll-thumb: #b6bcc6;
    --scroll-thumb-hover: #9aa2ad;
  }

  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-sans);
    font-size: 13px;
    -webkit-font-smoothing: antialiased;
    font-feature-settings: "cv11";
  }
  body {
    min-height: 100vh;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 28px 20px 60px;
    background-image:
      radial-gradient(1200px 600px at 50% -10%, color-mix(in oklab, var(--accent) 6%, transparent), transparent 60%),
      linear-gradient(var(--bg), var(--bg));
  }

  .window {
    width: 980px;
    max-width: 100%;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: calc(var(--radius) + 4px);
    overflow: hidden;
    box-shadow:
      0 1px 0 color-mix(in oklab, var(--text) 4%, transparent) inset,
      0 40px 80px -30px rgba(0,0,0,0.6),
      0 10px 30px -10px rgba(0,0,0,0.4);
    display: flex;
    flex-direction: column;
  }
  .titlebar {
    height: 38px;
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 0 4px 0 12px;
    background: var(--panel);
    border-bottom: 1px solid var(--border);
    user-select: none;
  }
  .titlebar .logo { width: 18px; height: 18px; display: grid; place-items: center; color: var(--accent); }
  .titlebar .title { font-size: 12.5px; font-weight: 500; letter-spacing: 0.02em; color: var(--text); }
  .titlebar .title .dim { color: var(--text-faint); font-weight: 400; }
  .titlebar .spacer { flex: 1; }
  .titlebar .theme-toggle {
    display: inline-flex; align-items: center; gap: 2px; padding: 3px;
    margin-right: 4px; background: var(--panel-inset);
    border: 1px solid var(--border); border-radius: 6px;
  }
  .theme-toggle button {
    background: transparent; border: 0; width: 22px; height: 22px;
    border-radius: 4px; color: var(--text-dim);
    display: grid; place-items: center; cursor: pointer;
  }
  .theme-toggle button.active { background: var(--btn-bg-active); color: var(--text); }
  .win-btn {
    width: 42px; height: 38px; display: grid; place-items: center;
    background: transparent; border: 0; color: var(--text-dim); cursor: pointer;
  }
  .win-btn:hover { background: var(--btn-bg-hover); color: var(--text); }
  .win-btn.close:hover { background: #e5484d; color: white; }

  .body {
    display: grid;
    grid-template-columns: 1fr 1fr;
    background: var(--panel);
  }
  .pane {
    padding: 14px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    max-height: 620px;
    overflow-y: auto;
    scrollbar-gutter: stable;
  }
  .pane > * { flex-shrink: 0; }
  .pane.left { border-right: 1px solid var(--border); }

  .pane::-webkit-scrollbar, .scroll::-webkit-scrollbar { width: 10px; height: 10px; }
  .pane::-webkit-scrollbar-track, .scroll::-webkit-scrollbar-track { background: var(--scroll-track); }
  .pane::-webkit-scrollbar-thumb, .scroll::-webkit-scrollbar-thumb {
    background: var(--scroll-thumb); border-radius: 999px; border: 2px solid var(--scroll-track);
  }
  .pane::-webkit-scrollbar-thumb:hover, .scroll::-webkit-scrollbar-thumb:hover { background: var(--scroll-thumb-hover); }

  .section {
    background: var(--panel-2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    flex-shrink: 0;
  }
  .section-header {
    display: flex; align-items: center; gap: 8px;
    padding: 8px 10px; cursor: pointer; user-select: none; background: var(--panel-2);
  }
  .section-header:hover { background: color-mix(in oklab, var(--panel-2) 85%, var(--text) 15%); }
  .section-header .icon { width: 18px; height: 18px; display: grid; place-items: center; color: var(--accent); }
  .section-header .title {
    font-size: 12px; font-weight: 600; letter-spacing: 0.04em;
    text-transform: uppercase; color: var(--text);
  }
  .section-header .chev { color: var(--text-faint); transition: transform .18s ease; }
  .section.collapsed .chev { transform: rotate(-90deg); }
  .section-body { padding: 10px 12px 12px; border-top: 1px solid var(--border); display: grid; gap: 8px; }
  .section.collapsed .section-body { display: none; }

  .row {
    display: grid;
    grid-template-columns: 92px 1fr;
    align-items: center;
    gap: 8px;
  }
  .label { font-size: 11.5px; color: var(--label); letter-spacing: 0.02em; }
  .controls { display: flex; gap: 6px; align-items: center; }

  .input, .select, .num {
    height: 28px;
    background: var(--input-bg);
    border: 1px solid var(--input-border);
    border-radius: 4px;
    color: var(--text);
    font-family: var(--font-mono);
    font-size: 12px;
    padding: 0 8px;
    outline: none;
    transition: border-color .12s, box-shadow .12s;
  }
  .input:hover, .select:hover, .num:hover { border-color: var(--input-border-hover); }
  .input:focus, .select:focus, .num:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); }
  .input { flex: 1; min-width: 0; }
  .num { width: 72px; text-align: right; }
  .num.sm { width: 56px; }
  .select {
    appearance: none; padding-right: 22px;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='10' viewBox='0 0 10 10'><path d='M2 4l3 3 3-3' fill='none' stroke='%239aa4b2' stroke-width='1.4' stroke-linecap='round' stroke-linejoin='round'/></svg>");
    background-repeat: no-repeat; background-position: right 7px center;
    font-family: var(--font-sans);
  }
  .select.flex { flex: 1; }

  .btn {
    height: 28px; padding: 0 12px;
    background: var(--btn-bg); border: 1px solid var(--input-border);
    border-radius: 4px; color: var(--text);
    font-family: inherit; font-size: 12px; font-weight: 500;
    letter-spacing: 0.01em; cursor: pointer;
    display: inline-flex; align-items: center; justify-content: center; gap: 6px;
    transition: background .12s, border-color .12s, color .12s;
  }
  .btn:hover { background: var(--btn-bg-hover); border-color: var(--input-border-hover); }
  .btn:active { background: var(--btn-bg-active); }
  .btn.primary { background: var(--accent); border-color: var(--accent); color: var(--accent-ink); }
  .btn.primary:hover { filter: brightness(1.08); }
  .btn.full { width: 100%; }
  .btn.sm { height: 24px; padding: 0 8px; font-size: 11.5px; }
  .btn[disabled] { opacity: 0.45; pointer-events: none; }

  .check {
    display: inline-flex; align-items: center; gap: 8px;
    font-size: 12px; color: var(--text); cursor: pointer; user-select: none;
  }
  .check input { display: none; }
  .check .box {
    width: 14px; height: 14px; border: 1.5px solid var(--input-border);
    border-radius: 3px; background: var(--input-bg);
    display: grid; place-items: center; transition: background .12s, border-color .12s;
  }
  .check input:checked + .box { background: var(--accent); border-color: var(--accent); }
  .check input:checked + .box::after {
    content: ""; width: 8px; height: 5px;
    border-left: 1.6px solid white; border-bottom: 1.6px solid white;
    transform: rotate(-45deg) translate(1px, -1px);
  }

  .status { display: inline-flex; align-items: center; gap: 6px; font-size: 12px; font-weight: 500; }
  .status .dot { width: 8px; height: 8px; border-radius: 999px; background: var(--text-faint);
    box-shadow: 0 0 0 3px color-mix(in oklab, var(--text-faint) 20%, transparent); }
  .status.ok { color: var(--ok); }
  .status.ok .dot { background: var(--ok); box-shadow: 0 0 0 3px color-mix(in oklab, var(--ok) 25%, transparent); animation: pulse 2s ease-in-out infinite; }
  .status.no-pulse .dot { animation: none !important; }
  .status.warn { color: var(--warn); }
  .status.warn .dot { background: var(--warn); box-shadow: 0 0 0 3px color-mix(in oklab, var(--warn) 25%, transparent); }
  .status.err { color: var(--danger); }
  .status.err .dot { background: var(--danger); box-shadow: 0 0 0 3px color-mix(in oklab, var(--danger) 25%, transparent); }
  .status.info { color: var(--info); }
  .status.info .dot { background: var(--info); box-shadow: 0 0 0 3px color-mix(in oklab, var(--info) 25%, transparent); }
  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 0 3px color-mix(in oklab, var(--ok) 25%, transparent); }
    50%      { box-shadow: 0 0 0 6px color-mix(in oklab, var(--ok) 0%, transparent); }
  }

  .readout { display: grid; grid-template-columns: 92px 1fr; gap: 8px 10px; align-items: center; }
  .readout .k { color: var(--label); font-size: 11.5px; letter-spacing: 0.02em; }
  .readout .v { font-family: var(--font-mono); font-size: 12.5px; color: var(--text); font-variant-numeric: tabular-nums; }
  .readout .v .unit { color: var(--text-faint); margin-left: 2px; }
  .readout .v .delta { color: var(--text-faint); margin-left: 6px; font-size: 11.5px; }

  .slew-pad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; }
  .slew {
    height: 64px; background: var(--btn-bg); border: 1px solid var(--input-border);
    border-radius: var(--radius); color: var(--text);
    font-weight: 600; font-size: 14px; letter-spacing: 0.05em;
    cursor: pointer; position: relative; display: grid; place-items: center;
    font-family: inherit;
    transition: background .12s, border-color .12s, transform .06s;
  }
  .slew:hover { background: var(--btn-bg-hover); border-color: var(--input-border-hover); }
  .slew:active { transform: translateY(1px); }
  .slew .dir {
    position: absolute; top: 6px; left: 8px;
    font-size: 10px; color: var(--text-faint);
    font-family: var(--font-mono); letter-spacing: 0.08em;
  }
  .slew.active { background: color-mix(in oklab, var(--accent) 18%, var(--btn-bg)); border-color: var(--accent); color: var(--text); }
  .slew.stop { background: var(--accent); border-color: var(--accent); color: var(--accent-ink); letter-spacing: 0.12em; }
  .slew.stop:hover { filter: brightness(1.08); }

  .slider { position: relative; flex: 1; height: 28px; display: flex; align-items: center; }
  .slider .track {
    position: absolute; left: 0; right: 0; top: 50%;
    height: 4px; margin-top: -2px;
    background: var(--input-bg); border: 1px solid var(--input-border);
    border-radius: 999px; overflow: hidden;
  }
  .slider .fill { position: absolute; left: 0; top: 0; bottom: 0; background: var(--accent); }
  .slider .knob {
    position: absolute; top: 50%; width: 14px; height: 14px;
    margin-top: -7px; margin-left: -7px;
    background: #fff; border: 2px solid var(--accent);
    border-radius: 999px; cursor: ew-resize;
  }

  .hint { color: var(--text-faint); font-size: 11.5px; }
  .pill {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 2px 8px; background: var(--chip);
    border: 1px solid var(--border); border-radius: 999px;
    font-size: 11px; color: var(--text-dim);
    font-family: var(--font-mono); letter-spacing: 0.02em;
  }
  .kbd {
    display: inline-block; padding: 1px 5px;
    border: 1px solid var(--border); border-bottom-width: 2px;
    border-radius: 3px; font-family: var(--font-mono);
    font-size: 10.5px; color: var(--text-dim); background: var(--panel-inset);
  }

  .conn-row { display: flex; gap: 6px; align-items: center; }
  .conn-row .status { margin-right: auto; }
  .btn-row { display: flex; gap: 6px; }
  .btn-row .btn { flex: 1; }
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .meridian-row {
    display: grid; grid-template-columns: 92px 56px 36px 1fr 72px;
    align-items: center; gap: 8px;
  }

  .console-block { border-top: 1px solid var(--border); background: var(--panel); padding: 10px 14px 14px; }
  .console-toolbar {
    display: flex; align-items: center; gap: 10px;
    padding: 0 0 10px; flex-wrap: wrap;
  }
  .console-toolbar .manual { display: flex; align-items: center; gap: 6px; flex: 1; min-width: 260px; }
  .console-toolbar .filter { display: flex; align-items: center; gap: 6px; }
  .console-toolbar .filter .input { height: 24px; font-size: 11.5px; width: 180px; }

  .console {
    background: var(--console-bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow-y: auto;
    font-family: var(--font-mono);
    font-size: 12px;
    padding: 8px 0;
  }
  .console::-webkit-scrollbar { width: 10px; }
  .console::-webkit-scrollbar-track { background: #0a0c11; }
  .console::-webkit-scrollbar-thumb { background: #2a313c; border-radius: 999px; border: 2px solid #0a0c11; }
  .log-line {
    display: grid; grid-template-columns: 100px 80px 30px 1fr 90px;
    padding: 2px 14px; gap: 10px; color: #c8d0dc;
  }
  .log-line:hover { background: var(--console-line); }
  .log-line .ts { color: var(--c-ts); }
  .log-line .cmd { color: var(--c-cmd); }
  .log-line .arr { color: var(--text-faint); }
  .log-line .resp { color: var(--c-resp); }
  .log-line .meta { color: var(--c-meta); text-align: right; }
  .log-line .blind { color: var(--text-faint); }

  .statusbar {
    display: flex; align-items: center; gap: 16px;
    padding: 8px 14px; font-size: 11.5px; color: var(--text-dim);
    border-top: 1px solid var(--border); background: var(--panel-2);
  }
  .statusbar .sep { width: 1px; height: 12px; background: var(--border); }
  .statusbar .grow { flex: 1; }

  .slewing {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 3px 10px 3px 8px; border-radius: 999px;
    background: color-mix(in oklab, var(--accent) 14%, transparent);
    border: 1px solid color-mix(in oklab, var(--accent) 40%, transparent);
    color: var(--text); font-size: 11.5px; font-weight: 500;
  }
  .slewing .radar { width: 14px; height: 14px; position: relative; }
  .slewing .radar::before, .slewing .radar::after {
    content: ""; position: absolute; inset: 0;
    border-radius: 50%; border: 1.5px solid var(--accent);
  }
  .slewing .radar::before { animation: ring 1.6s ease-out infinite; }
  .slewing .radar::after  { animation: ring 1.6s ease-out 0.8s infinite; }
  @keyframes ring {
    0%   { transform: scale(0.2); opacity: 1; }
    100% { transform: scale(1.1); opacity: 0; }
  }
  .slewing .coord { color: var(--text-dim); font-family: var(--font-mono); font-size: 11px; }

  .popup-wrap { max-width: 720px; }
  .sites-body { display: grid; grid-template-columns: 1fr 260px; }
  .sites-list { border-right: 1px solid var(--border); background: var(--panel); }
  .sites-list-head {
    display: grid; grid-template-columns: 1.4fr 1.1fr 1.1fr 0.8fr;
    padding: 8px 12px; font-size: 11px; color: var(--label);
    text-transform: uppercase; letter-spacing: 0.06em;
    background: var(--panel-2); border-bottom: 1px solid var(--border);
  }
  .sites-list-body { max-height: 320px; overflow-y: auto; }
  .site-row {
    display: grid; grid-template-columns: 1.4fr 1.1fr 1.1fr 0.8fr;
    padding: 8px 12px; font-family: var(--font-mono);
    font-size: 12px; cursor: pointer; border-bottom: 1px solid var(--border);
    position: relative;
  }
  .site-row:hover { background: var(--panel-2); }
  .site-row.selected { background: color-mix(in oklab, var(--accent) 12%, transparent); color: var(--text); }
  .site-row.selected::before {
    content: ""; position: absolute; left: 0; top: 0; bottom: 0;
    width: 2px; background: var(--accent);
  }
  .sites-editor { padding: 14px; display: flex; flex-direction: column; gap: 10px; }
  .sites-editor .f { display: flex; flex-direction: column; gap: 4px; }
  .sites-editor .f label { font-size: 11.5px; color: var(--label); }
  .sites-footer {
    display: flex; align-items: center; justify-content: flex-end; gap: 8px;
    padding: 10px 14px; border-top: 1px solid var(--border); background: var(--panel-2);
  }

  .stack { display: flex; flex-direction: column; gap: 28px; align-items: center; width: 100%; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="onstepx-app.jsx"></script>
</body>
</html>
